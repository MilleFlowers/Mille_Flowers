{% extends "base.html" %}
{% block title %}Editar Produto - {{ produto.nome }}{% endblock %}

{% block content %}
<div class="page-banner" style="min-height: 180px; padding: 30px 0;">
    <div class="container">
        <h1>Editar Produto</h1>
        <p>Atualizar detalhes de: {{ produto.nome }}</p>
    </div>
</div>

<div class="container section">
    <div class="admin-dashboard" style="max-width: 650px;">
        <div class="admin-card">
            <div class="admin-card-header">
                <h3><i class="fas fa-edit"></i> Editar Informações do Produto</h3>
            </div>
            <div class="admin-card-body">
                <form method="POST" class="admin-form" enctype="multipart/form-data">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="nome">Nome da Flor:</label>
                            <select id="nome" name="nome" required class="form-control">
                                <option value="{{ produto.nome }}">{{ produto.nome }} (Atual)</option>
                                {% for n in nomes_unicos %}
                                {% if n != produto.nome %}
                                <option value="{{ n }}">{{ n }}</option>
                                {% endif %}
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="cor">Cor:</label>
                            <select id="cor" name="cor" required class="form-control">
                                <!-- Opções carregadas via JavaScript -->
                                <option value="" disabled>-- Selecione uma cor --</option>
                                <option value="{{ produto.cor }}">{{ produto.cor | replace('_', ' ') | title }} (Atual)
                                </option>
                                {% for c in cores_unicas %}
                                {% if c != produto.cor %}
                                <option value="{{ c }}">{{ c | replace('_', ' ') | title }}</option>
                                {% endif %}
                                {% endfor %}
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="preco">Preço (€):</label>
                            <input type="number" id="preco" name="preco" value="{{ " %.2f"|format(produto.preco) }}"
                                step="0.01" required class="form-control">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="imagem_upload">Modificar Imagem (Upload de ficheiro do PC):</label>
                            <input type="file" id="imagem_upload" name="imagem_upload"
                                accept="image/png, image/jpeg, image/webp" class="form-control">
                            <small style="color: var(--color-text-lt); font-size: 0.8rem; margin-top: 5px;">Se não
                                escolher nenhuma imagem nova, a imagem atual será mantida.</small>
                        </div>
                    </div>

                    <div class="form-row" style="display:none;">
                        <!-- Oculto para não confundir o usuário, mas mantido para enviar o nome atual em caso de não fazer upload -->
                        <div class="form-group">
                            <label for="imagem_text">Nome do ficheiro antigo:</label>
                            <input type="text" id="imagem_text" name="imagem_text" value="{{ produto.imagem }}"
                                class="form-control">
                        </div>
                    </div>

                    <div style="display: flex; gap: 15px; margin-top: 25px;">
                        <button type="submit" class="btn" style="flex: 1; padding: 14px; font-size: 0.95rem;">
                            <i class="fas fa-save"></i> Guardar Alterações
                        </button>
                        <a href="{{ url_for('admin') }}" class="btn btn-outline"
                            style="flex: 1; text-align: center; padding: 14px; font-size: 0.95rem;">
                            <i class="fas fa-times"></i> Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Script para tornar a dropdown de cores dinâmica consoante a flor selecionada -->
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const nomeSelect = document.getElementById("nome");
        const corSelect = document.getElementById("cor");

        // Dados vindos do Flask
        const coresPorFlorStr = '{{ cores_por_flor_json | safe }}';
        const floresSemCorStr = '{{ flores_sem_cor_json | safe }}';

        const coresPorFlor = JSON.parse(coresPorFlorStr);
        const floresSemCor = JSON.parse(floresSemCorStr);
        const corAtual = "{{ produto.cor }}";
        const nomeOriginal = "{{ produto.nome }}";

        function atualizarCores(florSelecionada) {
            // Limpa as opções de cores atuais e adiciona o placeholder
            corSelect.innerHTML = '<option value="" disabled>-- Selecione uma cor --</option>';

            if (floresSemCor.includes(florSelecionada)) {
                // Se for flor sem cor variada (ex: Lavanda)
                const opt = document.createElement("option");
                opt.value = "normal";
                opt.textContent = "Normal";
                corSelect.appendChild(opt);
            } else {
                // Se for flor com cores (ex: Rosa, Caneta)
                let cores = coresPorFlor[florSelecionada];
                if (!cores) {
                    cores = coresPorFlor["default"];
                }

                cores.forEach(function (cor) {
                    const opt = document.createElement("option");
                    opt.value = cor;

                    // Formatar o texto (ex: "azul_claro" -> "Azul Claro")
                    let textoFormatado = cor.replace(/_/g, ' ');
                    textoFormatado = textoFormatado.charAt(0).toUpperCase() + textoFormatado.slice(1);
                    opt.textContent = textoFormatado;

                    // Se voltarmos à flor original, ou se a opção bater com a cor atual
                    if (florSelecionada === nomeOriginal && cor === corAtual) {
                        opt.selected = true;
                        opt.textContent += " (Atual)";
                    }

                    corSelect.appendChild(opt);
                });
            }
        }

        nomeSelect.addEventListener("change", function () {
            atualizarCores(this.value);
        });

        // Corre ao carregar a página
        if (nomeSelect.value !== nomeOriginal) {
            atualizarCores(nomeSelect.value);
        } else {
            atualizarCores(nomeOriginal);
        }
    });
</script>

{% endblock %}
